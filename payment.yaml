server:
  port: 9010

spring:
  application:
    name: "payment"

  datasource:
    url: "jdbc:oracle:thin:@//localhost:1521/ORCLPDB1"
    username: PAYMENT
    password: oracle
    driver-class-name: oracle.jdbc.OracleDriver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 10
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    root: INFO
  pattern:
    level: "%5p [%X{correlationId}]"

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
