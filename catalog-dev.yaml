server:
  port: 8090

spring:
  application:
    name: "catalog"
  datasource:
    url: "jdbc:oracle:thin:@//localhost:1521/ORCLPDB1"
    username: CATALOG
    password: oracle
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
  flyway:
    enabled: "true"

  config:
    import: "optional:configserver:http://localhost:8071/"

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"




